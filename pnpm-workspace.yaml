allowBuilds:
  '@google/genai': false
  '@swc/core': true
  electron: true
  electron-winstaller: true
  protobufjs: false
blockExoticSubdeps: false
catalog:
  vite: npm:@voidzero-dev/vite-plus-core@^0.1.24
  vite-plus: ^0.1.24
  vitest: npm:@voidzero-dev/vite-plus-test@^0.1.24
nodeLinker: hoisted
onlyBuiltDependencies:
  - '@swc/core'
  - '@tailwindcss/oxide'
  - electron
  - electron-winstaller
  - unrs-resolver
overrides:
  vite: 'catalog:'
  vitest: 'catalog:'
patchedDependencies:
  '@electron/packager@18.4.4': patches/@electron__packager@18.4.4.patch
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: '*'
    vitest: '*'
